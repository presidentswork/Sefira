function getTodayOmer() {
  var now = new Date();
  var utc = now.getTime() + now.getTimezoneOffset() * 60000;
  var edt = new Date(utc - (4 * 3600000));
  var h = edt.getHours(), m = edt.getMinutes();
  var afterNightfall = h > 20 || (h === 20 && m >= 42);
  var y = edt.getFullYear(), mo = edt.getMonth(), d = edt.getDate();
  var cal = new Date(y, mo, afterNightfall ? d + 1 : d);
  var omerDay1 = new Date(2026, 3, 3);
  var diff = Math.floor((cal - omerDay1) / 86400000) + 1;
  return diff >= 1 && diff <= 49 ? diff : null;
}

  { e:"The strength that makes you reliable. Gevurah through Yesod — discipline in service of real connection.", li:["People know what to expect from you — you're steady","Your relational commitments are as strong as your work commitments","You're as disciplined in how you show up for others as how you perform","You protect relationships with the same care as your time"], sh:["Extremely disciplined professionally, careless with people who matter","You hold others to standards you don't apply in relationships","Your reliability is transactional","You use I'm busy as a shield from emotional accountability"], wo:["Be as reliable in a personal commitment as a professional one","Keep one relational promise you might normally reschedule","Ask someone close: do they experience you as dependable?","Notice where your discipline protects you from intimacy"], p:"Does the person who knows you best experience you as someone they can count on?" },
  { e:"Two weeks complete. Gevurah of Malchut — strength made visible in the world.", li:["Your discipline this week changed something real","Someone experienced you as stronger and more honest","You held something you would have let go before","Your inner work showed up in outer behavior"], sh:["The discipline stayed internal — nothing actually changed","Your strength this week may have just been stubbornness","You were hard on yourself and soft on what needed confronting","Gevurah without Malchut is just private suffering"], wo:["Name one concrete thing that is different because of this week","If nothing changed — what was the obstacle?","Write one commitment to carry into Week 3","Acknowledge one way you showed real strength — and one you avoided"], p:"What did strength look like in your actual life this week — not as an idea, but as an action?" },
  { e:"The heart of the Tree of Life. Tiferet is truth, compassion, and beauty all at once.", li:["You see another person fully — not just their role","You respond to complexity with nuance","You find beauty in ordinary moments","You're moved by something today — and you let yourself be"], sh:["You tell yourself a beautiful story that doesn't match how you act","You pursue an ideal life while neglecting the actual one","You perform depth but avoid real vulnerability","You value beauty in art and ignore ugliness in your own character"], wo:["Look at someone close and really see them — not as you need them to be","Let one moment of beauty fully land — don't scroll past it","Find where your self-image is more flattering than the truth","Have one conversation where you're genuinely curious"], p:"Where is there a gap between the person you believe yourself to be and who your actions reveal?" },
  { e:"Compassion with strength. Tiferet through Gevurah — the heart that holds its shape under pressure.", li:["You stay emotionally present without shutting down or exploding","You feel someone's pain AND maintain your own groundedness","Your empathy is honest — you don't just validate everything","You hold space without losing yourself"], sh:["You armor your heart with analysis — understanding without feeling","You're emotionally available in theory but checked out when needed","You collapse into others' emotions and call it empathy","Your compassion has a shorter limit than you think"], wo:["Stay present in one uncomfortable conversation — don't redirect or escape","Notice when you go analytical to avoid feeling — and stay in the feeling","Ask someone how they're really doing — and just listen","Find the line between healthy boundaries and emotional unavailability"], p:"Think of someone who is struggling. Are you truly present with them or managing them from a safe distance?" },
  { e:"The radiant center. Tiferet of Tiferet — the heart fully open, truth fully spoken. Today the work is simply to shine.", li:["You're fully yourself — no performance, no mask","Your inner and outer life feel aligned","You speak from actual experience, not from what sounds right","You let yourself be moved — by music, by nature, by another person"], sh:["You curate your self-presentation so carefully you've lost track of what's real","You're more comfortable with the idea of openness than actual openness","You pursue perfection to avoid showing up as you are","You wait until you're ready before letting anyone really see you"], wo:["Say something true today that you usually keep to yourself","Let yourself receive something without deflecting","Notice where you're performing rather than being — and drop the performance","Find one place where what you say and feel don't match — and close the gap"], p:"Who in your life sees the real you — and who sees only the version you've decided is safe to show?" },
  { e:"Compassion that endures. Tiferet through Netzach — the heart that keeps showing up.", li:["You love people at their worst, not just their best","Your care doesn't fluctuate with how they treat you","You've stayed in a difficult relationship because it matters","Your compassion is a practice, not just a feeling"], sh:["Your empathy burns bright then burns out","You stay in situations that harm you and call it loyalty","You give compassion to others and none to yourself","You've become numb — the sustained difficulty has closed something in you"], wo:["Extend compassion to someone being difficult — ask what's underneath","Give yourself the same kindness you'd give a friend in your situation","Notice if numbness has replaced your sensitivity — gently reopen","Ask: where am I staying out of habit rather than genuine love?"], p:"Where have you closed your heart to protect yourself — and what would it cost you to open it again?" },
  { e:"Beauty seen through gratitude. Tiferet through Hod — compassion that makes you thankful for life as it is.", li:["You find something genuinely beautiful in an ordinary day","You feel grateful — not forced, just quietly thankful","You notice what you have rather than what you lack","You receive your life as a gift"], sh:["You know you have a lot but emotionally feel empty","Your gratitude is situational — thankful when things go well","You've stopped noticing the good because it became familiar","You perform positivity while privately carrying a different reality"], wo:["Find one thing you've completely stopped noticing — and really look at it","Write three things you're genuinely grateful for — and say why each matters","Tell someone their presence in your life is a gift — mean it","Sit for two minutes with the fact that you are alive today"], p:"If you looked at your life through the eyes of someone who wanted what you have — what would they see?" },
  { e:"The heart that creates real bonds. Tiferet through Yesod — compassion that connects at the soul level.", li:["You're genuinely interested in the inner life of someone close","You create safety — people tell you things they don't tell others","Your care makes people feel less alone","You love in a way that gives people room to be themselves"], sh:["You connect through roles and functions, not who people actually are","Your love comes with an unspoken vision of who the person should be","You need people to be okay so you can feel okay","You confuse closeness with control"], wo:["Ask someone close a question about their inner world — be genuinely curious","Notice if your love allows the other person to be themselves","Create one moment of real connection — not transactional","Be with someone in a way that has no agenda"], p:"Do the people closest to you feel truly seen and free — or managed and loved conditionally?" },
  { e:"Three weeks. Tiferet of Malchut — beauty and truth made real in the world.", li:["Your inner work showed up in how you treated people","Something in the world is more beautiful because you were in it","You brought truth AND compassion together in at least one moment","The heart you opened this week stayed open"], sh:["Tiferet stayed theoretical — a beautiful framework that didn't touch behavior","You were moved emotionally but unmoved practically","You recognized the gap between who you are and who you want to be — and did nothing","Another week of insight without change"], wo:["Name one relationship that is genuinely better because of this week","Name one truth you brought into your life — not just thought about","What opened in your heart this week that you want to protect?","Write one intention for the week ahead"], p:"What is one concrete thing that is more beautiful, more true, or more loving in your life because of this week?" },
  { e:"Endurance, passion, and the will that keeps going. Netzach — the force beneath all sustained effort.", li:["You know what you're fighting for and it pulls you forward","Your energy comes from genuine passion, not habit or fear","You've built something real through sustained effort","You have a deep well — and you know how to draw from it"], sh:["Driven by desire but not sure which desires are yours","Passion but no direction — intensity without aim","You can't rest — busyness has become your identity","You keep going out of stubbornness and call it perseverance"], wo:["Name the deepest why behind your main effort — say it out loud","Notice what you're doing from genuine desire vs. compulsion","Give yourself permission to stop today — real rest","Ask: what am I really chasing, and is it worth chasing?"], p:"Underneath the busyness — what do you actually want? Is your life moving toward it?" },
  { e:"Discipline in service of endurance. Gevurah of Netzach — the structure that sustains your passion.", li:["You pace yourself — tomorrow matters as much as today","Your habits serve what you love, not replace it","You finish things even when excitement is gone","You've learned the rhythm of effort and rest"], sh:["You sprint until you crash — all-or-nothing pattern","Your discipline is brittle — one disruption and the structure falls","You've disciplined the passion out of what you love","You rest only when forced to"], wo:["Build in one deliberate pause today — before you need it","Look at one area where all-or-nothing is costing you","Do less today than you could — as a conscious choice","Ask: what would sustainable look like where I currently burn and crash?"], p:"Is your current pace one you could maintain for a year? If not — what needs to change?" },
  { e:"Passion aligned with heart. Tiferet of Netzach — when your energy comes from love, not just drive.", li:["You work on something and it feels like it matters","Your motivation connects to your values, not just ambitions","You feel the difference between effort from love and effort from fear","What you're working toward has meaning — and you know why"], sh:["You've optimized for success and lost track of why you wanted it","You're excellent at things you no longer love","You confuse intensity with passion — busyness with purpose","You're chasing someone else's definition of winning"], wo:["Reconnect with why you started something you're currently grinding through","Ask: if I succeeded completely — would my life feel meaningful?","Find one thing you do purely for love — make time for it today","Notice when effort comes from joy vs. anxiety — try to shift the ratio"], p:"When did you last do something just because you loved it — not because it served a goal?" },
  { e:"Pure endurance. Netzach of Netzach — the unbreakable will. The Baal Shem Tov taught the greatest test is persistence in the dark.", li:["You've survived something that would stop many people — and you're still here","Your resilience has been tested and held","You don't need external motivation to keep going","You know what you're made of because situations have shown you"], sh:["You keep going when you should stop — stubbornness as strength","You insist on doing it alone — can't receive help","Your endurance is actually avoidance — staying in motion to avoid feeling","You've mistaken suffering for virtue"], wo:["Acknowledge something you've carried for a long time — and honor the strength that took","Ask: is this thing I'm persisting with worth persisting with?","Let someone help you today with something you'd normally handle alone","Distinguish between endurance that builds and endurance that just delays"], p:"What have you been pushing through that actually deserves to be put down?" },
  { e:"Victory acknowledged. Hod of Netzach — gratitude for the endurance that carried you.", li:["You recognize your resilience was not yours alone","You thank someone who held you up when you were running on empty","You celebrate small wins — not just the finish line","You acknowledge how far you've come, not just how far you have to go"], sh:["You never celebrate — always more to do before you're allowed to feel good","You take sole credit for what required a village","So focused on the destination you never experience the journey","You dismiss your accomplishments before anyone else can"], wo:["Celebrate one small win today — actually let yourself feel it","Thank someone who made your endurance possible — name specifically what they did","Look back at where you were a year ago and acknowledge the distance","Let someone else carry something — practice being grateful instead of resentful"], p:"What have you accomplished that you've never let yourself fully appreciate?" },
  { e:"Passion that connects. Yesod of Netzach — your endurance in service of real relationship.", li:["Your energy and drive inspire the people around you","Your commitment makes others want to commit too","You channel your passion into creating — not just doing","Your persistence builds something others can inhabit and build on"], sh:["Your drive leaves people behind — always ahead, they're always catching up","Your passion for work crowds out your passion for people","Your endurance isolates you — long hours, grinding, absence","You build things but neglect relationships, then wonder why you feel alone"], wo:["Bring someone into your effort today — share what you're working toward","Make sure close people know they matter more than the work","Ask: does my drive serve the people I love — or take from them?","Find one way your passion can be directed toward someone, not just something"], p:"Who has paid the price for your ambition — and do they know you know?" },
  { e:"Four weeks. Netzach of Malchut — endurance made visible in the world.", li:["Something real was built or sustained because you didn't quit","Your persistence showed up in behavior, not just intention","Someone else's life is different because you kept going","The effort was worth it — you can see why"], sh:["You endured — but you're not sure what for","Your persistence was indistinguishable from avoidance","You were busy but nothing grew","The drive is there but the direction is still unclear"], wo:["Name one thing that exists or improved because you stayed with it","If you're not sure — clarify: what are you actually building?","Write the one commitment you most want to sustain into Week 5","Rest today — real, guilt-free rest — as an act of Avodah"], p:"When you look at what you built this week — are you proud of it?" },
  { e:"Splendor, humility, and the art of receiving. Hod asks: can you let goodness actually reach you?", li:["You receive a compliment and let it land — really land","You ask for help without making it a big thing","You acknowledge what others contribute without diminishing your own","You find yourself genuinely grateful — spontaneously"], sh:["You deflect every compliment — oh it was nothing","You can't accept help without feeling you owe something","Your humility is actually a defense against being seen","You make yourself small so others won't expect too much"], wo:["Accept one compliment today fully — just say thank you and nothing else","Ask for help with something you've been handling alone out of pride","Notice every time you minimize yourself today — and try once not to","Receive something — praise, care, a meal — without immediately reciprocating"], p:"What would it mean to let yourself be seen as worthy of love and recognition — without deflecting?" },
  { e:"The courage to acknowledge. Gevurah of Hod — it takes real strength to say I was wrong.", li:["You own your mistakes without over-explaining","You say I was wrong and mean it — and nothing collapses","You receive criticism and find truth in it before defending","Your acknowledgments are clean — no but, no however"], sh:["Your apologies always have a second half that undoes the first","You accept fault for things that aren't yours to avoid conflict","You never admit you're wrong — you just quietly change your behavior","Pride disguises itself as certainty"], wo:["Find one thing you got wrong and acknowledge it — to yourself or out loud","When criticized today, find the part that's true before you respond","Drop but from one apology","Notice when defensiveness kicks in — and pause before speaking"], p:"Is there an acknowledgment you owe someone that you've been avoiding?" },
  { e:"Gratitude that comes from the heart. Tiferet of Hod — genuine thankfulness, not performance.", li:["You feel grateful for something specific today — and it's real","Your thank-yous are detailed and genuine — people feel the difference","You notice beauty and goodness you usually scroll past","Your gratitude changes how you see a situation, not just how you describe it"], sh:["Your gratitude is a spiritual to-do — you list it because you should","You feel grateful in abundance and forget when things are hard","You're grateful in general but not for anyone specifically","You perform gratitude in public and carry resentment in private"], wo:["Write one thing you're genuinely grateful for — and write why, specifically","Tell one person today something you appreciate about them — make it specific","Find gratitude for something difficult — what has a hard situation taught you?","Spend two minutes in genuine wonder at something ordinary"], p:"What is something you've completely stopped appreciating — and what would it feel like to see it fresh?" },
  { e:"Sustained gratitude. Netzach of Hod — the practice of finding something to be grateful for every single day.", li:["Even on a hard day, you find one thing that was real and good","Your gratitude is a discipline — not dependent on circumstances","You've trained yourself to notice abundance rather than default to lack","Your orientation toward life is fundamentally one of receiving"], sh:["You force gratitude as a way of avoiding legitimate pain","Your positivity doesn't reach the parts that are actually hurting","You've bypassed your own suffering by covering it with spiritual language","You tell others to be grateful when they need to be heard first"], wo:["Find one genuine thing to be grateful for in your hardest current situation","Don't force it — if nothing comes, sit with the difficulty first","Notice if your gratitude practice is authentic or avoidant","Let yourself feel something difficult today — and then find the grace inside it"], p:"Is there something you're using gratitude to bypass — a pain that deserves to be felt rather than reframed?" },
  { e:"Lag B'Omer — Hod of Hod. The yahrtzeit of Rabbi Shimon bar Yochai. The hidden light burst through. The soul at full radiance.", li:["You let yourself celebrate — fully, without guilt","You recognize the light in yourself and let it shine today","You bring joy into a room just by being fully present","You express something that's been building — creativity, love, truth"], sh:["You suppress your own radiance so others won't feel uncomfortable","You celebrate others easily but can't celebrate yourself","Your joy has a ceiling — you pull back right when things get really good","You perform happiness while something real goes unexpressed"], wo:["Do something joyful today — not productive, not useful, just joyful","Let yourself shine in one moment without dimming it","Tell someone what makes you light up — let them see that part of you","Light a fire today. Let it be a symbol of what burns in you"], p:"What is the part of you that most wants to be expressed — and what stops you from letting it out?" },
  { e:"Gratitude that deepens bonds. Yesod of Hod — when acknowledgment becomes the foundation of real connection.", li:["You tell someone what they mean to you — specifically and truly","Your acknowledgment creates closeness rather than just being polite","People feel genuinely seen and appreciated in your presence","You express love and gratitude before being forced to by a crisis or loss"], sh:["You assume people know how you feel — so you never say it","Your acknowledgment is general — you're great — rather than real","You express gratitude only when it's socially expected","You've never told the most important people what they actually mean to you"], wo:["Tell one person today something specific they've done that changed your life","Write a message to someone you love that says exactly what you feel — and send it","Don't wait for the right moment — say what you mean today","Ask: if this person weren't here tomorrow, what would I wish I had said?"], p:"Who deserves to hear from you today — and what exactly would you say if you knew they needed to hear it?" },
  { e:"Five weeks. Hod of Malchut — gratitude and acknowledgment made real in the world.", li:["Someone felt genuinely seen this week because of you","You received something this week — care, praise, help — and let it in","Your gratitude practice changed how you moved through at least one day","You expressed appreciation that you'd been holding inside"], sh:["The week passed with invisible gratitude — felt but not expressed","You received care and immediately deflected or reciprocated","Your humility kept you from being seen — and you called that virtue","Another week of good intentions that didn't make it into words"], wo:["Name one person who felt more appreciated this week because of you","Name one moment you allowed yourself to genuinely receive","If neither — do one of these things before the week closes","Write one thing you want to carry into Week 6"], p:"What did gratitude look like in your actual life this week — not as a concept, but as a moment?" },
  { e:"The channel between worlds. Yesod connects all the higher Sefirot to Malchut. The midah of Yosef HaTzaddik. What are you actually transmitting?", li:["What you feel inside matches what others experience from you","You're a conduit — good things flow through you to others","Your inner life is rich and you share it selectively and genuinely","People feel more themselves around you — you don't distort"], sh:["There's a wall between your inner world and your outer expression","You leak — unprocessed emotion spills out in ways you're not aware of","You overshare in ways that center you rather than connect you","People experience a version of you that isn't quite real"], wo:["Ask: what am I actually transmitting today?","Share something true about your inner world with one person","Notice where you're leaking — emotion coming out sideways rather than directly","Find the gap between how you intend to come across and how you actually land"], p:"If the people in your life described the energy you bring — what would they say? Is that what you meant to bring?" },
  { e:"Connection held by structure. Gevurah of Yesod — intimacy that has healthy limits.", li:["You're genuinely open AND you know where the limit is","Your vulnerability is chosen — not compulsive, not armored","You let people in without losing yourself","Your closeness feels spacious, not suffocating"], sh:["Your walls are so high that closeness is impossible","You connect with everyone at the same shallow depth","You share too much too fast and then feel exposed and retreat","You confuse emotional unavailability with healthy boundaries"], wo:["Let one person a little closer today — share something you usually keep back","Notice the moment you want to shut down — and try staying one beat longer","If you tend to overshare — practice holding something back","Ask: what is one real boundary I need to set — and one false one I should remove?"], p:"In your closest relationships — are you more likely to let too much in, or to keep too much out?" },
  { e:"The beauty of true meeting. Tiferet of Yesod — when two people really see each other.", li:["You have a conversation today where both people leave feeling more real","You're interested in the inner life of someone close — not their performance","Your presence creates safety — people say things to you they don't say elsewhere","You connect with the person, not the role they play in your life"], sh:["Your relationships are functional rather than soulful","You connect through doing — activities, tasks — but rarely through being","You know someone's schedule better than their heart","Your deepest conversations are with strangers, not people you live with"], wo:["Have one real conversation today — about what actually matters","Ask someone: what are you carrying right now that you haven't told anyone?","Be with someone without an agenda — not helpful, not productive, just present","Notice if you connect more easily with strangers than with people you love — and why"], p:"Who knows your inner world — really knows it? And whose inner world do you know?" },
  { e:"Bonds that outlast difficulty. Netzach of Yesod — the connection that endures.", li:["You have relationships that survived real difficulty — and they're stronger for it","You reach out to people even when there's nothing to do together","Your love doesn't require people to be at their best","You invest in relationships before they need saving"], sh:["You let relationships atrophy through busyness and tell yourself they'll always be there","When things get hard in a relationship, you disappear","Your connections are maintained by proximity — when circumstance changes, the relationship ends","You're loyal to ideas of people rather than to actual people"], wo:["Reach out today to someone you've lost touch with — not because there's a reason, just because you value them","Do something for a relationship before it needs anything","Sit with a hard relational moment instead of walking away","Ask: who in my life have I been taking for granted?"], p:"Which of your important relationships has been running on fumes — and what would it take to refuel it?" },
  { e:"The humility of needing others. Hod of Yesod — connection expressed in the acknowledgment of dependence.", li:["You say I need you — and mean it, and let it land","You allow yourself to be held as well as to hold","You acknowledge what others give you specifically and truthfully","Your relationships have real mutuality — both people give and receive"], sh:["You connect but never admit dependency — always the strong one","You take quietly and give visibly — the calculus is off","Your gratitude stays private and your needs stay hidden","You confuse self-sufficiency with strength — and pay for it with loneliness"], wo:["Tell someone today: I couldn't do this without you — say specifically why","Let someone help you with something and receive it without minimizing","Ask for something you need from someone you trust","Admit a dependency that you've been hiding under independence"], p:"Who do you need — and do they know it?" },
  { e:"The foundation of foundations. Yesod of Yesod — the deepest capacity for genuine connection. Are you truly known by anyone?", li:["You are known — really known — by at least one person","You have tended your most essential bonds with care and intention","Your capacity for intimacy has grown — you can go deeper than you could before","You are both seen and seeing — the connection is mutual and real"], sh:["You feel profoundly alone even when surrounded by people","Your most important relationships feel hollow or distant","You've been so focused on external life that your inner world has no witness","You've forgotten how to be close — or never fully learned"], wo:["If you feel alone: don't turn away — let it point toward what you need","Reach out to one person today with real honesty about how you're doing","If you are well-connected: invest deeply in what you have","Ask: who would I call if something broke open in me tonight?"], p:"Are you truly known by anyone? And if not — what stands between you and that?" },
  { e:"Six weeks. Yesod of Malchut — connection made real in the world.", li:["A relationship is genuinely better because of this week's work","You said something true that needed to be said","Someone felt less alone because of you this week","You allowed yourself to be less alone because of someone else"], sh:["The connection stayed in your head — you thought about reaching out but didn't","Another week of busyness that crowded out the people who matter","You were present everywhere except where it counted","The loneliness is still there, untouched"], wo:["Name one relationship that moved this week — even an inch","If nothing moved: make one call, send one message, say one real thing today","Write what you most want to carry into the final week","Ask: who do I want to be closer to by Shavuot?"], p:"What is the most important relationship in your life right now — and what does it need from you?" },
  { e:"Sovereignty. Presence. The divine that manifests. Malchut is about being fully present to what is already here.", li:["You move through your day as yourself — not performing, not shrinking","You inhabit your life rather than observing it from a distance","You make decisions from your own center, not from fear of what others think","You are present enough to actually experience what is happening"], sh:["You feel disconnected from your own life — going through the motions","You live in your head and call it thinking when it's really avoiding","You're always in the next moment — planning, worrying — never in this one","You feel like an outsider in your own story"], wo:["Take three breaths right now — really feel them","For five minutes today, do one thing with complete presence","Notice when you leave your body today — and come back","Ask: where am I actually living — in the present, in the past, or in the future?"], p:"When did you last feel fully present — fully yourself, fully here? What made it possible?" },
  { e:"The sovereign who holds limits. Gevurah of Malchut — presence that doesn't collapse under pressure.", li:["You stay yourself in difficult situations — you don't shape-shift","Your identity doesn't depend on others' approval","You can be in a room full of pressure and still know who you are","You hold your ground without aggression"], sh:["You become whoever the room needs you to be","Your self disappears in strong personalities","You confuse compliance with peace","You enforce authority through fear rather than presence"], wo:["Notice one moment where you're about to adjust yourself to manage someone — and don't","Hold your position in one conversation — calmly, without defensiveness","Ask: in which relationships do I tend to lose myself?","Find the difference between stubbornness and genuine groundedness — practice the latter"], p:"Who or what has the most power to destabilize your sense of self — and what does that tell you?" },
  { e:"Presence made beautiful. Tiferet of Malchut — when who you are and how you show up are the same thing.", li:["You carry yourself with dignity — not pride, but genuine self-respect","The way you show up matches what you believe about yourself","People feel something when you walk in — not because you're performing, but because you're real","Your inner life and outer life are aligned"], sh:["There's a gap between who you believe you are and who your actions reveal","You invest in image rather than integrity","You have a public self and a private self and they barely know each other","You've built a life that looks right outside and feels empty inside"], wo:["Find one place today where your inner reality and outer presentation don't match — and close the gap","Do one thing today that's true rather than impressive","Ask: what would I do differently if no one were watching?","Let something true about you be seen today — without curating it first"], p:"Is there a version of you that you've been keeping hidden — and what would it take to let it live?" },
  { e:"The sovereign who persists. Netzach of Malchut — presence that builds over time.", li:["You show up as yourself — day after day — without needing a special occasion","Your presence in people's lives is steady, not dramatic","You've built your sovereignty through consistency, not grand gestures","Who you are today is the result of sustained inner work — and you can feel it"], sh:["You wait for the right moment to be yourself — and it never comes","Your best self shows up only under pressure or in peak experiences","You've been waiting to become the person you want to be instead of being them now","Your sovereignty is intermittent — present sometimes, absent often"], wo:["Be the person you want to be in one ordinary moment today — not a special one","Don't wait to feel ready — show up as yourself right now","Ask: in what areas of my life am I still living like I'm in rehearsal?","Notice the gap between your peak self and your daily self — and work to close it"], p:"If you lived every day as the person you are at your best — what would be different?" },
  { e:"The sovereign who bows. Hod of Malchut — the royalty that knows how to receive, to thank, to be genuinely grateful.", li:["You receive your life — all of it — as a gift rather than a given","You bow before something greater than yourself and it doesn't diminish you","Your gratitude is sovereign: it comes from fullness, not fear","You are genuinely, quietly thankful to be here — alive, in this life"], sh:["You've stopped marveling — life became ordinary and you stopped receiving it","Your sovereignty has become arrogance — you've forgotten you didn't make yourself","You're grateful only when things go your way","You carry your life as a burden rather than a privilege"], wo:["Spend one minute today in genuine awe — at being alive, at light, at anything","Bow — physically or inwardly — before something greater than you","Receive today as a gift — even the hard parts","Say thank you — to God, to life, to someone — and mean it with your whole self"], p:"When did you last feel genuinely awe-struck — by your life, by existence, by something beyond you?" },
